{% extends "base.html" %} {% block title %}Manage Feeds — S-RSS Reader{%
endblock %} {% block content %}
<div class="feeds-page">
  <h2>Manage Feeds</h2>

  <form
    class="add-feed-form"
    hx-post="/feeds"
    hx-target="#feed-list"
    hx-swap="outerHTML"
    hx-on::after-request="this.reset()"
  >
    <input
      type="url"
      name="url"
      placeholder="https://example.com/feed.xml"
      required
    />
    <input
      type="text"
      name="category"
      placeholder="Category (optional)"
      class="category-add-input"
    />
    <button type="submit">Add Feed</button>
  </form>

  <div class="feed-list-toolbar">
    <button hx-post="/feeds/refresh-all"
            hx-target="#feed-list"
            hx-swap="outerHTML"
            hx-indicator="#refresh-all-ind"
            hx-disabled-elt="this">
      Refresh All
    </button>
    <span id="refresh-all-ind" class="htmx-indicator fetching-text">Fetching…</span>
  </div>

  {% include "partials/feed_list.html" %}
</div>
{% endblock %}
